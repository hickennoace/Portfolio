[package]
name = "daniel-shaulov/portfolio"
version = "0.1.0"
description = "Daniel Shaulov — Analyst portfolio. Built with Next.js, deployed on Wasmer Edge."
license = "MIT"

[build]
command = "npm ci && npm run build"

[dependencies]
"wasmer/static-web-server" = "^1"

[fs]
"/public" = "out"
"/settings" = "settings"

[[command]]
name = "script"
module = "wasmer/static-web-server:webserver"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["-w", "/settings/config.toml"]
