# Wasmer static-web-server config
# Docs: https://static-web-server.net/configuration/config-file/

[general]
root = "/public"
log-level = "info"
host = "::"
port = 80

page404 = "/404.html"

# Always send a clean index.html when the path is a directory
directory-listing = false

# Reasonable cache headers for the static export
cache-control-headers = true

# Compression at the edge
compression = true
compression-level = "default"

[advanced]

[[advanced.headers]]
source = "**/*.{js,css,woff2,ico,svg,png,jpg,jpeg,webp,avif}"
[advanced.headers.headers]
Cache-Control = "public, max-age=31536000, immutable"

[[advanced.headers]]
source = "**/*.html"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
